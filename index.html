<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>顔判定 - ASTRA</title>
<link rel="apple-touch-icon" sizes="180x180" href="./icon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./icon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icon/favicon-16x16.png">
<link rel="shortcut icon" href="./icon/favicon.ico">
<link rel="manifest" href="./icon/site.webmanifest">
<meta name="theme-color" content="#ffffff">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<header class="astra-header">
  <a class="astra-brand" href="./" aria-label="ASTRA home">
    <img src="./assets/astra-header-icon.png" alt="ASTRA">
    <span><strong>ASTRA</strong></span>
  </a>
</header>
<main class="wrap">
  <section class="hero">
    <p class="eyebrow"><i class="fas fa-wand-magic-sparkles"></i> Recognition</p>
    <h1>画像からメンバーを判定</h1>
    <p class="lead">ASTRAは画像内の顔を検出し、学習済みデータからメンバー候補を顔ごとに表示します。複数人が写っている画像にも対応します。</p>
  </section>

  <section class="panel">
    <label class="file-drop">
      <input type="file" id="image-input" accept="image/*" multiple>
      <span><i class="fas fa-image"></i> 画像を選択</span>
    </label>
    <label class="toggle-row">
      <input type="checkbox" id="frame-toggle" checked>
      <span>画像上にフレームを表示</span>
    </label>
    <p class="status" id="status">モデルを読み込み中...</p>
  </section>

  <section class="panel hidden" id="preview-panel">
    <div class="results" id="results"></div>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<script src="./matcher.js"></script>
<script src="./app.js"></script>
</body>
</html>
