<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>顔学習 - ASTRA</title>
<link rel="apple-touch-icon" sizes="180x180" href="./icon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./icon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icon/favicon-16x16.png">
<link rel="shortcut icon" href="./icon/favicon.ico">
<link rel="manifest" href="./icon/site.webmanifest">
<meta name="theme-color" content="#ffffff">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body data-train-mode="blog">
<header class="astra-header">
  <a class="astra-brand" href="./" aria-label="ASTRA home">
    <img src="./assets/astra-header-icon.png" alt="ASTRA">
    <span><strong>ASTRA</strong></span>
  </a>
</header>
<main class="wrap">
  <section class="hero">
    <p class="eyebrow"><i class="fas fa-database"></i> Train</p>
    <h1>顔データを登録</h1>
    <p class="lead">画像から顔を検出し、メンバー名を指定してASTRAの学習データに追加します。ブログ画像モードでは最新の画像から順に確認できます。</p>
    <div class="top-links">
      <a class="button soft" href="./"><i class="fas fa-wand-magic-sparkles"></i>判定画面</a>
      <a class="button soft" href="./sort.html"><i class="fas fa-images"></i>仕分け専用</a>
      <a class="button soft" href="./train-image.html"><i class="fas fa-image"></i>画像学習</a>
      <button class="button soft hidden" id="sort-access-open-btn" type="button" onclick="openSortAccessModal()"><i class="fas fa-user-lock"></i>Sort権限</button>
      <button class="button soft hidden" id="image-access-open-btn" type="button" onclick="openImageAccessModal()"><i class="fas fa-user-lock"></i>画像学習権限</button>
    </div>
  </section>

  <section class="panel">
    <div class="seg" role="tablist" aria-label="学習方法">
      <button type="button" class="active" id="mode-blog" onclick="setTrainMode('blog')">ブログ画像</button>
      <button type="button" id="mode-upload" onclick="setTrainMode('upload')">アップロード</button>
      <button type="button" id="mode-url" onclick="setTrainMode('url')">URL</button>
    </div>
    <label class="toggle-row">
      <input type="checkbox" id="efficient-mode-toggle" checked>
      <span>効率学習モード</span>
    </label>
    <p class="status" id="status">モデルを読み込み中...</p>
  </section>

  <section class="train-layout">
    <div class="grid">
      <section class="panel" id="blog-panel">
        <label class="label" for="blog-select">開始するブログ</label>
        <select class="select" id="blog-select" onchange="selectBlogStart()"></select>
        <button class="button soft filter-open" type="button" onclick="openMemberModal()">
          <i class="fas fa-sliders"></i><span id="blog-member-summary">全メンバー</span>
        </button>
        <div class="blog-card" id="blog-info"></div>
        <div class="actions blog-actions">
          <button class="button" id="undo-btn" type="button" onclick="goBackImage()" disabled>戻る</button>
          <button class="button primary" type="button" onclick="skipBlog()">スキップ</button>
        </div>
      </section>

      <section class="panel hidden" id="upload-panel">
        <label class="file-drop">
          <input type="file" id="upload-input" accept="image/*">
          <span><i class="fas fa-image"></i> 学習画像を選択</span>
        </label>
      </section>

      <section class="panel hidden" id="url-panel">
        <label class="label" for="url-input">画像URL</label>
        <div class="grid two">
          <input class="field" id="url-input" type="url" placeholder="https://...jpg">
          <button class="button primary" type="button" onclick="loadUrlImage()">読み込む</button>
        </div>
      </section>

      <section class="panel hidden" id="image-panel">
        <div class="preview" id="preview">
          <img id="train-image" alt="">
          <canvas id="overlay"></canvas>
        </div>
        <div class="face-list" id="face-list"></div>
        <div class="mobile-save-bar">
          <div class="save-summary" id="save-summary">登録する顔を設定してください。</div>
          <button class="button primary" id="save-btn" type="button" onclick="handlePrimaryAction()" disabled>選択した顔を登録</button>
        </div>
      </section>
    </div>

    <aside class="grid">
      <section class="panel">
        <p class="label">登録対象</p>
        <p class="status" id="assignment-help" style="margin-top:0;">顔ごとにメンバーを指定できます。登録しない顔はそのままにしてください。</p>
      </section>
      <section class="panel">
        <p class="label">学習状況</p>
        <div class="stats-grid" id="stats"></div>
      </section>
    </aside>
  </section>
</main>
<div class="modal-backdrop hidden" id="member-modal" onclick="closeMemberModal(event)">
  <section class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="member-modal-title">
    <div class="modal-head">
      <div>
        <p class="eyebrow">Filter</p>
        <h2 id="member-modal-title">ブログメンバー</h2>
      </div>
      <button class="icon-button" type="button" onclick="closeMemberModal()"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="member-filter" id="blog-member-filter"></div>
    <div class="modal-actions">
      <button class="button soft" type="button" onclick="selectAllBlogMembers()">全員</button>
      <button class="button primary" type="button" onclick="closeMemberModal()">閉じる</button>
    </div>
  </section>
</div>
<div class="modal-backdrop hidden" id="sort-access-modal" onclick="closeSortAccessModal(event)">
  <section class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="sort-access-title">
    <div class="modal-head">
      <div>
        <p class="eyebrow">Access</p>
        <h2 id="sort-access-title">Sort権限</h2>
      </div>
      <button class="icon-button" type="button" onclick="closeSortAccessModal()"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="access-manager">
      <div class="seg" role="tablist" aria-label="Sort権限モード">
        <button type="button" id="sort-access-mode-limited" onclick="setSortAccessMode('limited')">個別許可</button>
        <button type="button" id="sort-access-mode-all" onclick="setSortAccessMode('all')">全員に解放</button>
      </div>
      <div class="grid two">
        <input class="field" id="sort-access-user-id" type="number" inputmode="numeric" min="1" placeholder="ユーザーID">
        <button class="button primary" type="button" id="sort-access-add-btn" onclick="saveSortAccessUser('active')">追加</button>
      </div>
      <p class="status" id="sort-access-status">許可ユーザーを読み込み中...</p>
      <div class="access-user-list" id="sort-access-list"></div>
    </div>
  </section>
</div>
<div class="modal-backdrop hidden" id="image-access-modal" onclick="closeImageAccessModal(event)">
  <section class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="image-access-title">
    <div class="modal-head">
      <div>
        <p class="eyebrow">Access</p>
        <h2 id="image-access-title">画像学習権限</h2>
      </div>
      <button class="icon-button" type="button" onclick="closeImageAccessModal()"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="access-manager">
      <div class="seg" role="tablist" aria-label="画像学習権限モード">
        <button type="button" id="image-access-mode-limited" onclick="setImageAccessMode('limited')">個別許可</button>
        <button type="button" id="image-access-mode-all" onclick="setImageAccessMode('all')">全員に解放</button>
      </div>
      <div class="grid two">
        <input class="field" id="image-access-user-id" type="number" inputmode="numeric" min="1" placeholder="ユーザーID">
        <button class="button primary" type="button" id="image-access-add-btn" onclick="saveImageAccessUser('active')">追加</button>
      </div>
      <p class="status" id="image-access-status">許可ユーザーを読み込み中...</p>
      <div class="access-user-list" id="image-access-list"></div>
    </div>
  </section>
</div>
<div class="blog-bottom-bar" id="blog-bottom-bar">
  <button class="button" id="undo-bottom-btn" type="button" onclick="goBackImage()" disabled>戻る</button>
  <button class="button primary" id="save-bottom-btn" type="button" onclick="handlePrimaryAction()" disabled>登録</button>
  <button class="button primary" type="button" onclick="skipBlog()">スキップ</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<script src="./matcher.js"></script>
<script src="./train.js?v=20260605-member-reset"></script>
</body>
</html>
